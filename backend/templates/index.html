<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮影动画生成平台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎭 皮影动画生成平台</h1>
            <p>基于AI的皮影戏动画创作工具</p>
        </header>

        <div class="main-content">
            <!-- 左侧：功能面板 -->
            <div class="sidebar">
                <div class="panel">
                    <h2>📝 剧本生成</h2>
                    <div class="form-group">
                        <label>主题</label>
                        <input type="text" id="theme" placeholder="例如：三打白骨精" value="三打白骨精">
                    </div>
                    <div class="form-group">
                        <label>角色</label>
                        <input type="text" id="character" placeholder="例如：孙悟空" value="孙悟空">
                    </div>
                    <div class="form-group">
                        <label>场景数</label>
                        <input type="number" id="length" min="1" max="10" value="5">
                    </div>
                    <div class="form-group">
                        <label>OpenAI API密钥（可选）</label>
                        <input type="password" id="api_key" placeholder="留空使用模拟模式">
                    </div>
                    <button class="btn btn-primary" onclick="generateScript()">生成剧本</button>
                </div>

                <div class="panel">
                    <h2>🎬 动作捕捉</h2>
                    <div class="form-group">
                        <label>上传视频</label>
                        <input type="file" id="video_file" accept="video/*">
                    </div>
                    <button class="btn btn-primary" onclick="captureMotion()">开始捕捉</button>
                </div>

                <div class="panel">
                    <h2>🏷️ 动作标签</h2>
                    <button class="btn btn-secondary" onclick="labelActions()">添加标签</button>
                </div>
            </div>

            <!-- 中间：结果显示 -->
            <div class="content">
                <div id="loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>处理中...</p>
                </div>

                <div id="script_result" class="result-panel" style="display: none;">
                    <h2>📜 生成的剧本</h2>
                    <div id="script_content"></div>
                    <button class="btn btn-download" onclick="downloadScript()">下载剧本</button>
                </div>

                <div id="motion_result" class="result-panel" style="display: none;">
                    <h2>🎯 动作捕捉结果</h2>
                    <div id="motion_content"></div>
                    <button class="btn btn-download" onclick="downloadBVH()">下载BVH</button>
                </div>

                <div id="actions_result" class="result-panel" style="display: none;">
                    <h2>🏷️ 动作标签</h2>
                    <div id="actions_content"></div>
                </div>
            </div>

            <!-- 右侧：动作库 -->
            <div class="sidebar">
                <div class="panel">
                    <h2>📚 动作库</h2>
                    <div id="action_library"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
